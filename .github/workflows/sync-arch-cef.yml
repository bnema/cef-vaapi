name: Sync Arch cef

on:
  schedule:
    # Run daily at 06:00 UTC to check for Arch cef updates
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    name: Check for Arch cef update and sync
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get current package version
        id: current
        run: |
          source PKGBUILD
          echo "pkgver=${pkgver}" >> "$GITHUB_OUTPUT"
          echo "pkgrel=${pkgrel}" >> "$GITHUB_OUTPUT"
          echo "_cef_commit=${_cef_commit}" >> "$GITHUB_OUTPUT"
          echo "Current: cef-vaapi ${pkgver}-${pkgrel} (CEF commit ${_cef_commit})"

      - name: Check latest Arch cef package version
        id: upstream
        run: |
          upstream_srcinfo=$(curl -fsSL "https://gitlab.archlinux.org/archlinux/packaging/packages/cef/-/raw/main/.SRCINFO")
          upstream_pkgver=$(printf '%s\n' "$upstream_srcinfo" | awk -F' = ' '/^[[:space:]]*pkgver = / { print $2; exit }')
          upstream_pkgrel=$(printf '%s\n' "$upstream_srcinfo" | awk -F' = ' '/^[[:space:]]*pkgrel = / { print $2; exit }')

          test -n "$upstream_pkgver"
          test -n "$upstream_pkgrel"

          echo "pkgver=${upstream_pkgver}" >> "$GITHUB_OUTPUT"
          echo "pkgrel=${upstream_pkgrel}" >> "$GITHUB_OUTPUT"
          echo "Upstream: cef ${upstream_pkgver}-${upstream_pkgrel}"

      - name: Check if update is needed
        id: check
        run: |
          current="${{ steps.current.outputs.pkgver }}-${{ steps.current.outputs.pkgrel }}"
          upstream="${{ steps.upstream.outputs.pkgver }}-${{ steps.upstream.outputs.pkgrel }}"

          if [ "$current" = "$upstream" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "cef-vaapi is up to date (${current})"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "Update available: ${current} -> ${upstream}"
          fi

      - name: Run update-from-arch-cef.sh in Arch container
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            archlinux:latest \
            bash -lc 'pacman -Syu --noconfirm base-devel git python && bash scripts/update-from-arch-cef.sh'

      - name: Check PKGBUILD validity after update
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          bash -n scripts/update-from-arch-cef.sh
          bash -n PKGBUILD
          echo "PKGBUILD syntax OK"

      - name: Validate invariants after update
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          grep -q 'use_vaapi=true' PKGBUILD || { echo "FAIL: use_vaapi=true missing after update"; exit 1; }
          grep -q 'ffmpeg_branding="Chrome"' PKGBUILD || { echo "FAIL: ffmpeg_branding missing after update"; exit 1; }
          grep -q 'proprietary_codecs=true' PKGBUILD || { echo "FAIL: proprietary_codecs missing after update"; exit 1; }
          grep -q "conflicts=('cef')" PKGBUILD || { echo "FAIL: conflicts missing after update"; exit 1; }
          grep -q 'cef::git+https://github.com/chromiumembedded/cef.git' PKGBUILD || { echo "FAIL: source alias changed after update"; exit 1; }
          ! grep -q '^[[:space:]]*\[ffmpeg\]=ffmpeg' PKGBUILD || { echo "FAIL: system ffmpeg enabled after update"; exit 1; }
          ! grep -q '^[[:space:]]*replaces=' PKGBUILD || { echo "FAIL: replaces present after update"; exit 1; }
          echo "All invariants preserved"

      - name: Extract new package version
        id: newver
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          source PKGBUILD
          echo "pkgver=${pkgver}" >> "$GITHUB_OUTPUT"
          echo "pkgrel=${pkgrel}" >> "$GITHUB_OUTPUT"
          echo "New: cef-vaapi ${pkgver}-${pkgrel}"

      - name: Create or update pull request
        if: steps.check.outputs.up_to_date == 'false'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "sync: cef-vaapi ${{ steps.current.outputs.pkgver }}-${{ steps.current.outputs.pkgrel }} → ${{ steps.newver.outputs.pkgver }}-${{ steps.newver.outputs.pkgrel }}"
          title: "Sync cef-vaapi to Arch cef ${{ steps.upstream.outputs.pkgver }}-${{ steps.upstream.outputs.pkgrel }}"
          body: |
            ## Automated sync from Arch Linux cef package

            Arch has updated its official `cef` package. This PR syncs `cef-vaapi` to match.

            - Arch cef `${{ steps.current.outputs.pkgver }}-${{ steps.current.outputs.pkgrel }}` → Arch cef `${{ steps.upstream.outputs.pkgver }}-${{ steps.upstream.outputs.pkgrel }}`
            - Updated PKGBUILD, assets, and .SRCINFO from upstream
            - Minimal delta preserved: VAAPI flag, package metadata, guardrails, libva dep
            - Proprietary codecs and bundled ffmpeg unchanged

            After merging to `main`, repository automation publishes the committed source package to AUR as `cef-vaapi`, then builds a matching VAAPI-enabled binary on the trusted self-hosted runner, creates a GitHub Release, and publishes `cef-vaapi-bin` to AUR.
          branch: sync/arch-cef-${{ steps.upstream.outputs.pkgver }}-${{ steps.upstream.outputs.pkgrel }}
          base: main
          labels: automated, sync
