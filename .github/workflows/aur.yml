name: AUR Publish

on:
  workflow_dispatch:

jobs:
  publish-aur:
    name: Publish cef-vaapi source package to AUR
    runs-on: ubuntu-latest
    concurrency:
      group: cef-vaapi-aur-publish
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract package metadata
        id: pkg
        run: |
          source PKGBUILD
          echo "pkgver=${pkgver}" >> "$GITHUB_OUTPUT"
          echo "pkgrel=${pkgrel}" >> "$GITHUB_OUTPUT"
          echo "Publishing cef-vaapi ${pkgver}-${pkgrel}"

      - name: Validate required CEF media and VAAPI flags
        run: |
          grep -q 'ffmpeg_branding="Chrome"' PKGBUILD
          grep -q 'proprietary_codecs=true' PKGBUILD
          grep -q 'rtc_use_pipewire=true' PKGBUILD
          grep -q 'link_pulseaudio=true' PKGBUILD
          grep -q 'use_vaapi=true' PKGBUILD
          grep -q 'cef::git+https://github.com/chromiumembedded/cef.git' PKGBUILD
          ! grep -q '^[[:space:]]*\[ffmpeg\]=ffmpeg' PKGBUILD
          ! grep -q '^[[:space:]]*replaces=' PKGBUILD
          echo "All required CEF flags validated"

      - name: Publish cef-vaapi to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: cef-vaapi
          pkgbuild: ./PKGBUILD
          assets: |
            *.patch
            FindCEF.cmake
            README.md
            LICENSE
            LICENSE.ARCH-ISC
            REUSE.toml
            LICENSES/
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update cef-vaapi to ${{ steps.pkg.outputs.pkgver }}-${{ steps.pkg.outputs.pkgrel }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
