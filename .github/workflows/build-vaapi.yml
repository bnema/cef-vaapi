name: Build and publish cef-vaapi-bin

on:
  schedule:
    # Check daily for new Arch cef releases and build a binary if missing.
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Rebuild even if the GitHub Release already exists'
        type: boolean
        default: false
  push:
    branches:
      - main
    paths:
      - PKGBUILD
      - .SRCINFO
      - '*.patch'
      - FindCEF.cmake
      - scripts/update-from-arch-cef.sh

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build cef-vaapi and publish cef-vaapi-bin
    # Never run public PR code on the self-hosted runner.
    if: github.event_name != 'pull_request' && github.event_name != 'pull_request_target'
    runs-on: [self-hosted, cef-builder, linux, x64]
    timeout-minutes: 720
    concurrency:
      group: cef-vaapi-build-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync packaging from Arch cef
        run: |
          bash scripts/update-from-arch-cef.sh
          git diff -- PKGBUILD .SRCINFO '*.patch' FindCEF.cmake || true

      - name: Extract package metadata
        id: pkg
        run: |
          source PKGBUILD
          pkgfile="cef-vaapi-${pkgver}-${pkgrel}-x86_64.pkg.tar.zst"
          tag="cef-vaapi-v${pkgver}-${pkgrel}"
          echo "pkgver=${pkgver}" >> "$GITHUB_OUTPUT"
          echo "pkgrel=${pkgrel}" >> "$GITHUB_OUTPUT"
          echo "pkgfile=${pkgfile}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Building ${pkgfile} from Arch cef ${pkgver}-${pkgrel}"

      - name: Check whether binary release already exists
        id: release_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.pkg.outputs.tag }}" --json id >/dev/null 2>&1; then
            if [ "${{ inputs.force_rebuild }}" = "true" ]; then
              echo "exists=false" >> "$GITHUB_OUTPUT"
              echo "Release exists, but force_rebuild=true"
            else
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "Release already exists; nothing to build"
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No existing release for ${{ steps.pkg.outputs.tag }}"
          fi

      - name: Build cef-vaapi package
        if: steps.release_check.outputs.exists == 'false'
        id: build
        run: |
          export XDG_CACHE_HOME=/cache
          export SRCDEST=/cache/sources
          mkdir -p "$SRCDEST"

          makepkg -s --noconfirm
          test -f "${{ steps.pkg.outputs.pkgfile }}"
          ls -lh "${{ steps.pkg.outputs.pkgfile }}"
          echo "package_path=$(realpath "${{ steps.pkg.outputs.pkgfile }}")" >> "$GITHUB_OUTPUT"

      - name: Verify built binary contains VAAPI symbols
        if: steps.release_check.outputs.exists == 'false'
        run: |
          set -euo pipefail
          tmpdir=$(mktemp -d)
          trap 'rm -rf "$tmpdir"' EXIT

          bsdtar -xOf "${{ steps.pkg.outputs.pkgfile }}" usr/lib/cef/libcef.so > "$tmpdir/libcef.so"
          strings "$tmpdir/libcef.so" | grep -E 'vaCreateContext|VaapiVideoDecoder|libva\.so' | tee VAAPI-CHECK.txt
          test -s VAAPI-CHECK.txt

      - name: Generate checksum
        if: steps.release_check.outputs.exists == 'false'
        id: checksum
        run: |
          sha256=$(sha256sum "${{ steps.pkg.outputs.pkgfile }}" | cut -d' ' -f1)
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"
          printf '%s  %s\n' "$sha256" "${{ steps.pkg.outputs.pkgfile }}" > SHA256SUMS
          cat SHA256SUMS

      - name: Prepare release provenance artifacts
        if: steps.release_check.outputs.exists == 'false'
        run: |
          cp PKGBUILD "cef-vaapi-${{ steps.pkg.outputs.pkgver }}-${{ steps.pkg.outputs.pkgrel }}-PKGBUILD"
          cp .SRCINFO "cef-vaapi-${{ steps.pkg.outputs.pkgver }}-${{ steps.pkg.outputs.pkgrel }}-SRCINFO"

      - name: Create GitHub Release
        if: steps.release_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.pkg.outputs.tag }}" >/dev/null 2>&1; then
            gh release delete "${{ steps.pkg.outputs.tag }}" --yes --cleanup-tag
          fi

          gh release create "${{ steps.pkg.outputs.tag }}" \
            --repo bnema/cef-vaapi \
            --title "cef-vaapi ${{ steps.pkg.outputs.pkgver }}-${{ steps.pkg.outputs.pkgrel }}" \
            --notes "CEF ${{ steps.pkg.outputs.pkgver }}-${{ steps.pkg.outputs.pkgrel }} with VAAPI and proprietary codecs enabled.

            SHA256: \`${{ steps.checksum.outputs.sha256 }}\`

            Release assets include the generated PKGBUILD, generated SRCINFO, and VAAPI symbol check output for provenance.

            Install manually:
            \`\`\`
            sudo pacman -U ${{ steps.pkg.outputs.pkgfile }}
            \`\`\`
            " \
            "${{ steps.build.outputs.package_path }}" \
            SHA256SUMS \
            VAAPI-CHECK.txt \
            "cef-vaapi-${{ steps.pkg.outputs.pkgver }}-${{ steps.pkg.outputs.pkgrel }}-PKGBUILD" \
            "cef-vaapi-${{ steps.pkg.outputs.pkgver }}-${{ steps.pkg.outputs.pkgrel }}-SRCINFO"

      - name: Generate cef-vaapi-bin PKGBUILD
        if: steps.release_check.outputs.exists == 'false'
        run: |
          mkdir -p pkgbuild/cef-vaapi-bin
          cat > pkgbuild/cef-vaapi-bin/PKGBUILD <<EOF
          # Maintainer: bnema <b@bnema.dev>
          pkgname=cef-vaapi-bin
          pkgver=${{ steps.pkg.outputs.pkgver }}
          pkgrel=${{ steps.pkg.outputs.pkgrel }}
          pkgdesc="Chromium Embedded Framework with VAAPI and proprietary codecs enabled (binary distribution)"
          arch=('x86_64')
          url="https://chromiumembedded.github.io/cef"
          license=('BSD-3-Clause')
          provides=("cef=\$pkgver")
          conflicts=('cef')
          depends=(
            'alsa-lib'
            'at-spi2-core'
            'dbus'
            'libdrm'
            'libffi'
            'libpulse'
            'libva'
            'libxcomposite'
            'libxdamage'
            'libxkbcommon'
            'libxrandr'
            'mesa'
            'nss'
            'pango'
          )
          optdepends=(
            'libva-mesa-driver: VAAPI driver for AMD GPUs'
            'intel-media-driver: VAAPI driver for modern Intel GPUs'
            'libva-utils: VAAPI diagnostics such as vainfo'
          )
          source=("cef-vaapi-\${pkgver}-\${pkgrel}-x86_64.pkg.tar.zst::https://github.com/bnema/cef-vaapi/releases/download/cef-vaapi-v\${pkgver}-\${pkgrel}/cef-vaapi-\${pkgver}-\${pkgrel}-x86_64.pkg.tar.zst")
          sha256sums=('${{ steps.checksum.outputs.sha256 }}')

          package() {
            bsdtar -xpf "\${srcdir}/cef-vaapi-\${pkgver}-\${pkgrel}-x86_64.pkg.tar.zst" -C "\${pkgdir}" usr
          }
          EOF
          sed -i -E 's/^[[:space:]]{10}//' pkgbuild/cef-vaapi-bin/PKGBUILD
          bash -n pkgbuild/cef-vaapi-bin/PKGBUILD
          makepkg --printsrcinfo -p pkgbuild/cef-vaapi-bin/PKGBUILD > pkgbuild/cef-vaapi-bin/.SRCINFO

      - name: Publish cef-vaapi-bin to AUR
        if: steps.release_check.outputs.exists == 'false'
        env:
          AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
          AUR_EMAIL: ${{ secrets.AUR_EMAIL }}
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "$AUR_USERNAME"
          test -n "$AUR_EMAIL"
          test -n "$AUR_SSH_PRIVATE_KEY"

          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > "$HOME/.ssh/aur"
          chmod 600 "$HOME/.ssh/aur"
          ssh-keyscan -t rsa,ecdsa,ed25519 aur.archlinux.org >> "$HOME/.ssh/known_hosts"

          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/aur -o IdentitiesOnly=yes"
          git config --global user.name "$AUR_USERNAME"
          git config --global user.email "$AUR_EMAIL"

          rm -rf /tmp/cef-vaapi-bin-aur
          if ! git clone ssh://aur@aur.archlinux.org/cef-vaapi-bin.git /tmp/cef-vaapi-bin-aur; then
            mkdir -p /tmp/cef-vaapi-bin-aur
            git -C /tmp/cef-vaapi-bin-aur init
            git -C /tmp/cef-vaapi-bin-aur remote add origin ssh://aur@aur.archlinux.org/cef-vaapi-bin.git
          fi
          cp pkgbuild/cef-vaapi-bin/PKGBUILD pkgbuild/cef-vaapi-bin/.SRCINFO /tmp/cef-vaapi-bin-aur/

          cd /tmp/cef-vaapi-bin-aur
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "AUR cef-vaapi-bin already up to date"
          else
            git commit -m "Update cef-vaapi-bin to ${{ steps.pkg.outputs.pkgver }}-${{ steps.pkg.outputs.pkgrel }}"
            git push origin master
          fi
